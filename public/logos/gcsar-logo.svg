<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
  <!-- Hintergrund: Weiß/Transparent -->
  <rect width="100%" height="100%" fill="none" />

  <!-- GCSAR Text (Oben Links) -->
  <text x="70" y="160" font-family="'Times New Roman', Times, serif" font-size="64" font-weight="normal" fill="#000000" letter-spacing="2">GCSAR</text>

  <!-- Grafische Elemente / Bögen -->
  <g id="logo-arcs" stroke-linecap="round">
    <!-- Äußerer brauner Bogen -->
    <path d="M 445,120 C 580,200 540,440 330,490 C 180,520 80,430 110,360" fill="none" stroke="#b36239" stroke-width="8" />
    
    <!-- Innerer gelber Bogen -->
    <path d="M 430,220 C 370,160 210,180 150,290 C 100,380 150,470 270,450" fill="none" stroke="#f6ef65" stroke-width="6" />
    
    <!-- Innerer hellblauer Bogen -->
    <path d="M 340,245 C 280,230 180,270 185,380 C 190,430 220,440 240,430" fill="none" stroke="#71bfe7" stroke-width="6" />
  </g>

  <!-- Pflanze / Blätter (Grün) -->
  <g id="plant">
    <!-- Hauptstängel -->
    <path d="M 295,490 Q 290,360 330,240" fill="none" stroke="#1da142" stroke-width="8" stroke-linecap="round" />
    
    <!-- Blatt 1 (unten links) -->
    <path d="M 292,410 C 260,400 240,360 255,335 C 275,340 290,370 292,390 Z" fill="#1da142" />
    
    <!-- Blatt 2 (unten rechts) -->
    <path d="M 293,395 C 320,380 350,385 355,415 C 335,425 305,415 293,395 Z" fill="#1da142" />

    <!-- Blatt 3 (mitte links) -->
    <path d="M 302,345 C 270,325 260,280 280,260 C 295,275 305,310 302,335 Z" fill="#1da142" />
    
    <!-- Blatt 4 (mitte rechts) -->
    <path d="M 305,330 C 335,310 365,310 375,340 C 355,360 320,350 305,330 Z" fill="#1da142" />

    <!-- Blatt 5 (oben links) -->
    <path d="M 315,285 C 295,260 290,220 315,210 C 325,230 325,265 315,285 Z" fill="#1da142" />
    
    <!-- Blatt 6 (oben rechts) -->
    <path d="M 318,275 C 345,245 375,240 390,270 C 370,290 340,290 318,275 Z" fill="#1da142" />
    
    <!-- Endblatt (Spitze) -->
    <path d="M 330,240 C 335,210 350,185 370,185 C 370,210 355,230 330,240 Z" fill="#1da142" />
  </g>

  <!-- Arabischer Text (Unten mittig) -->
  <text x="300" y="550" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="bold" fill="#000000" text-anchor="middle">الهيئة العامة للبحوث العلمية الزراعية</text>
</svg>
